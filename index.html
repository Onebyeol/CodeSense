<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeSense</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── 네비게이션 ── -->
  <nav class="nav">
    <a class="nav-logo" href="#" onclick="return false;">
      <img class="logo-img" src="logo.png" alt="CodeSense 로고">
      <span class="logo-name">CodeSense</span>
    </a>
    <div class="nav-right">
      <button class="btn-theme" id="btn-theme" onclick="toggleTheme()">라이트 모드</button>
    </div>
  </nav>

  <!-- ── 메인 레이아웃 ── -->
  <div class="layout" id="layout">

    <!-- 중앙 코드 입력 패널 -->
    <div class="center-panel" id="center-panel">

      <!-- 히어로 타이틀 -->
      <div class="hero-area">
        <h1 class="hero-title">코드를 붙여넣어 보세요</h1>
        <p class="hero-sub">AI가 한국어로 즉시 분석해드립니다</p>
      </div>

      <!-- 코드 입력 카드 -->
      <div class="input-card">

        <!-- 카드 헤더: 언어 선택 + 분석 모드 탭 -->
        <div class="card-header">
          <select class="lang-select" id="lang-select">
            <option value="auto">Auto Detect</option>
            <option value="Python">Python</option>
            <option value="JavaScript">JavaScript</option>
            <option value="Java">Java</option>
            <option value="C">C</option>
            <option value="C++">C++</option>
            <option value="TypeScript">TypeScript</option>
            <option value="Go">Go</option>
            <option value="Rust">Rust</option>
          </select>
          <div class="mode-tabs">
            <button class="tab active" data-mode="line">줄별 설명</button>
            <button class="tab" data-mode="summary">전체 요약</button>
            <button class="tab" data-mode="bug">버그 탐지</button>
            <button class="tab" data-mode="complexity">시간복잡도</button>
          </div>
        </div>

        <!-- 코드 에디터 -->
        <div class="editor-area">
          <div class="line-nums" id="line-nums">
            <span class="line-num">1</span>
          </div>
          <textarea
            id="code-input"
            placeholder="여기에 코드를 붙여넣으세요..."
            spellcheck="false"
          ></textarea>
        </div>

        <!-- 카드 푸터 -->
        <div class="card-footer">
          <span class="footer-hint">Ctrl + Enter 로 분석</span>
          <button class="btn-analyze" id="btn-analyze" onclick="analyze()">
            <span>▷</span> 분석 시작
          </button>
        </div>

      </div>
    </div>

    <!-- 오른쪽 결과 패널 -->
    <div class="result-panel" id="result-panel">
      <div class="result-header">
        <h2>분석 결과</h2>
        <div class="result-actions">
          <button class="btn-icon" onclick="copyResult()" title="복사">⎘</button>
          <button class="btn-icon" onclick="closeResult()" title="닫기">✕</button>
        </div>
      </div>
      <div class="result-body" id="result-body">
        <div class="result-empty" id="result-empty">
          <div class="result-empty-icon">{ }</div>
          <p>분석 결과가 여기에 표시됩니다</p>
        </div>
        <div class="result-text" id="result-text" style="display:none;"></div>
      </div>
    </div>

  </div>

  <!-- 토스트 알림 -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
